# Search Apple Maps and get directions
# Usage: agent-computer-use run examples/search-maps.yaml

app: Maps
timeout: 10
steps:
  - type: { selector: 'id="MapsSearchTextField"', text: 'Taj Mahal', submit: true }
  - wait-for: 'id="ActionRowItemTypeDirections"'
  - click: 'id="ActionRowItemTypeDirections"'
