services:
  build-linux:
    build:
      context: .
      dockerfile: Dockerfile.build
    volumes:
      - ../cli:/build
      - ../bin:/output
    command: >
      bash -c "
        set -e
        echo '→ Building Linux x86_64...'
        cargo zigbuild --release --target x86_64-unknown-linux-gnu
        cp target/x86_64-unknown-linux-gnu/release/agent-click /output/agent-click-linux-x64
        chmod +x /output/agent-click-linux-x64
        echo '✓ Linux x86_64 done'

        echo '→ Building Linux ARM64...'
        cargo zigbuild --release --target aarch64-unknown-linux-gnu
        cp target/aarch64-unknown-linux-gnu/release/agent-click /output/agent-click-linux-arm64
        chmod +x /output/agent-click-linux-arm64
        echo '✓ Linux ARM64 done'
      "

  build-windows:
    build:
      context: .
      dockerfile: Dockerfile.build
    volumes:
      - ../cli:/build
      - ../bin:/output
    command: >
      bash -c "
        set -e
        echo '→ Building Windows x86_64...'
        cargo build --release --target x86_64-pc-windows-gnu
        cp target/x86_64-pc-windows-gnu/release/agent-click.exe /output/agent-click-windows-x64.exe
        echo '✓ Windows x86_64 done'
      "
