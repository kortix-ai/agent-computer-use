name: Bug Report
description: Something isn't working
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands to reproduce the issue.
      render: bash
      placeholder: |
        agent-computer-use snapshot Calculator -i
        agent-computer-use click @e5
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the JSON output or error message.
      render: json

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: agent-computer-use version
      description: 'Run: agent-computer-use --version'
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: 'Terminal.app, iTerm2, Warp, Ghostty'
