name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build ARM64
        run: cd cli && cargo build --release --target aarch64-apple-darwin
      - name: Build x64
        run: cd cli && cargo build --release --target x86_64-apple-darwin

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: |
            cli/target/aarch64-apple-darwin/release/agent-click
            cli/target/x86_64-apple-darwin/release/agent-click

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build x64
        run: cd cli && cargo build --release --target x86_64-unknown-linux-gnu
      - name: Build ARM64
        run: |
          cd cli
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: |
            cli/target/x86_64-unknown-linux-gnu/release/agent-click
            cli/target/aarch64-unknown-linux-gnu/release/agent-click

  release:
    name: Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-macos
          path: artifacts/macos

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: artifacts/linux

      - name: Bundle binaries into bin/
        run: |
          mkdir -p bin
          cp artifacts/macos/cli/target/aarch64-apple-darwin/release/agent-click bin/agent-click-macos-arm64
          cp artifacts/macos/cli/target/x86_64-apple-darwin/release/agent-click bin/agent-click-macos-x64
          cp artifacts/linux/cli/target/x86_64-unknown-linux-gnu/release/agent-click bin/agent-click-linux-x64
          cp artifacts/linux/cli/target/aarch64-unknown-linux-gnu/release/agent-click bin/agent-click-linux-arm64
          chmod +x bin/agent-click-*
          echo "📦 Bundled binaries:"
          ls -lh bin/agent-click-*

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm changeset publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
