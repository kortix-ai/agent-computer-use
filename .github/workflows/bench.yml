name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'cli/src/**'
      - 'cli/crates/**'
      - 'cli/benches/**'
  pull_request:
    branches: [main]
    paths:
      - 'cli/src/**'
      - 'cli/crates/**'
      - 'cli/benches/**'

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: Run Benchmarks
    runs-on: macos-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Run benchmarks
        run: cargo bench --bench benchmarks -- --output-format bencher | tee bench-output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: agent-click benchmarks
          tool: cargo
          output-file-path: cli/bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Comment on PR with benchmark comparison
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: false
          # Only push to gh-pages on main branch
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          benchmark-data-dir-path: 'dev/bench'
